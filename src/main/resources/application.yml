server:
  port: 8080

spring:
  application:
    name: identity-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:identity}
    username: ${DB_USER:identity}
    password: ${DB_PASSWORD:identity}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
    show-sql: false

  mail:
    host: smtp-relay.brevo.com
    port: 587
    username: ${EMAIL_FROM_ADDRESS:noreply@example.com}
    password: ${EMAIL_PROVIDER_API_KEY:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.starttls.required: true

  jackson:
    default-property-inclusion: non_null

management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: health,prometheus,loggers,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

  jwt:
    secret: ${JWT_SECRET}
    access-token-ttl: ${JWT_ACCESS_TTL:PT15M}
    refresh-token-ttl: ${JWT_REFRESH_TTL:P30D}

  google:
    client-id: ${GOOGLE_OAUTH_CLIENT_ID:}

  github:
    client-id: ${GITHUB_OAUTH_CLIENT_ID:}

  apple:
    client-id: ${APPLE_OAUTH_CLIENT_ID:}

  microsoft:
    client-id: ${MICROSOFT_OAUTH_CLIENT_ID:}
    tenant-id: ${MICROSOFT_OAUTH_TENANT_ID:common}

  email:
    from-address: ${EMAIL_FROM_ADDRESS:noreply@example.com}
