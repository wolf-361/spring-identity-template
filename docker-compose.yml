services:
  postgres:
    image: postgres:18-alpine
    container_name: identity-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-identity}
      POSTGRES_USER: ${DB_USER:-identity}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-identity}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-identity} -d ${DB_NAME:-identity}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
